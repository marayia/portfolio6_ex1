<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>EX1 - Krousi</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="./script.js" defer></script>
    </head>
    <body>
        <div class="container">
            <header class="text-center py-4">
                <h1 class="fw-bold">Exercise 1</h1>
            </header>
        </div>

        <div class="container">
            <div class="card prime-card shadow-sm p-4">
                <h3 class="text-center">Prime Finder</h3>

                <p class="text-center py-2">This page will show all prime numbers that are less or equal to your input!</p>

                <div class="mb-3">
                    <label for="numInput" class="form-label">Enter a number: </label>
                    <input type="number" id="numInput" class="form-control" placeholder="e.g., 25">
                </div>

                <button class="btn btn-dark w-100" id="calculateBtn">Show Primes</button>

                <div id="resultArea"></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
